{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS RAMÓN BY BOSCO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bosco: {
                            dark: '#1a1a1a',    /* El fondo oscuro del menú físico */
                            gray: '#2d2d2d',    /* Para las tarjetas de productos */
                            orange: '#ff6600',  /* El naranja exacto de RAMÓN */
                            text: '#f3f4f6',    /* Blanco hueso para leer bien */
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'], /* Fuente limpia parecida al menú */
                    }
                }
            }
        }
    </script>
    <style>
        /* Ajustes para scrollbar oscuro */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a1a1a; }
        ::-webkit-scrollbar-thumb { background: #ff6600; border-radius: 4px; }
    </style>
</head>
<body class="bg-bosco-dark text-bosco-text min-h-screen font-sans">
    
    {% block content %}
    {% endblock %}

<script>
    // ═══════ CSRF TOKEN HELPER (GLOBAL) ═══════
    window.BOSCO_RUNTIME_HEADERS = {
        'X-Ledger-Registry-Hash': '{{ ledger_registry_hash|default:""|escapejs }}',
        'X-POS-App-Version': '{{ ledger_client_app_version|default:""|escapejs }}',
        'X-POS-Queue-Schema': '{{ ledger_min_supported_queue_schema|default:""|escapejs }}'
    };

    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    function getHeaders() {
        const headers = {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken'),
        };
        Object.entries(window.BOSCO_RUNTIME_HEADERS || {}).forEach(([key, value]) => {
            if (value !== null && value !== undefined && String(value).trim() !== '') {
                headers[key] = String(value);
            }
        });
        return headers;
    }
</script>
    <!-- Footer Global -->
    <div class="fixed bottom-1 right-2 text-[8px] text-gray-600 font-bold opacity-50 hover:opacity-100 transition pointer-events-none">
        POWERED BY Ü SYSTEMS
    </div>
</body>
</html>
