<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cotizar Envio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-gray-900 border border-gray-700 rounded-2xl p-6">
    <h1 class="text-xl font-black text-orange-400 mb-1">Pedido #{{ venta.id }}</h1>
    <p class="text-sm text-gray-400 mb-3">{{ venta.cliente_nombre }}</p>
    <p class="text-sm text-gray-300">Total productos: <strong>${{ venta.total|floatformat:2 }}</strong></p>
    {% if venta.ubicacion_lat and venta.ubicacion_lng %}
    <a class="inline-block mt-2 text-xs text-blue-400 underline" target="_blank" href="https://www.google.com/maps?q={{ venta.ubicacion_lat }},{{ venta.ubicacion_lng }}">Ver ubicacion</a>
    {% endif %}

    {% if ya_cotizado %}
      <div class="mt-5 p-3 rounded bg-green-900/30 border border-green-800 text-green-300 text-sm font-bold">
        Este pedido ya fue cotizado por otro delivery.
      </div>
    {% else %}
      <form method="post" action="/integrations/delivery/quote/{{ token }}/submit/" class="mt-5 space-y-3">
        <label class="block text-xs font-bold text-gray-400 uppercase">Precio de envio</label>
        <input name="precio" type="number" step="0.50" min="0.5" required class="w-full bg-black border border-gray-600 rounded px-3 py-3 text-white font-bold" placeholder="Ej: 2.50"/>
        <button class="w-full bg-orange-500 hover:bg-orange-400 text-black font-black py-3 rounded-xl">Enviar cotizacion</button>
      </form>
    {% endif %}
  </div>
</body>
</html>
