<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Soy Delivery 🛵</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: sans-serif; background: #111; color: white; }</style>
</head>
<body class="p-4">

    <h1 class="text-xl font-black text-center mb-6 text-yellow-400">🛵 COTIZAR ENVÍOS</h1>

    {% for p in pedidos %}
    <div class="bg-gray-900 rounded-xl p-4 mb-4 border border-gray-700 shadow-xl">
        <div class="flex justify-between items-start mb-2">
            <div>
                <span class="bg-yellow-900 text-yellow-400 text-xs font-bold px-2 py-1 rounded">#{{ p.id }}</span>
                <p class="font-bold text-lg mt-1">{{ p.cliente_nombre }}</p>
            </div>
            <a href="https://www.google.com/maps?q={{ p.ubicacion_lat }},{{ p.ubicacion_lng }}" target="_blank"
               class="bg-blue-600 text-white px-3 py-2 rounded-lg text-xs font-bold">
               🗺️ VER MAPA
            </a>
        </div>
        
        <p class="text-gray-400 text-sm mb-4">{{ p.direccion_envio }}</p>
        
        <p class="text-[10px] font-bold text-gray-500 uppercase mb-2">FIJAR PRECIO DE ENTREGA:</p>
        <div class="grid grid-cols-4 gap-2">
            <button onclick="fijarPrecio({{ p.id }}, 1.00)" class="bg-gray-800 hover:bg-green-600 border border-gray-600 text-white font-bold py-3 rounded-lg text-sm transition-colors">$1.00</button>
            <button onclick="fijarPrecio({{ p.id }}, 1.50)" class="bg-gray-800 hover:bg-green-600 border border-gray-600 text-white font-bold py-3 rounded-lg text-sm transition-colors">$1.50</button>
            <button onclick="fijarPrecio({{ p.id }}, 2.00)" class="bg-gray-800 hover:bg-green-600 border border-gray-600 text-white font-bold py-3 rounded-lg text-sm transition-colors">$2.00</button>
            <button onclick="fijarPrecio({{ p.id }}, 2.50)" class="bg-gray-800 hover:bg-green-600 border border-gray-600 text-white font-bold py-3 rounded-lg text-sm transition-colors">$2.50</button>
            <button onclick="ingresarPrecio({{ p.id }})" class="col-span-4 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 font-bold py-2 rounded-lg text-xs mt-1">OTRO VALOR...</button>
        </div>
    </div>
    {% empty %}
    <div class="text-center py-20 opacity-50">
        <p class="text-4xl mb-2">😴</p>
        <p>No hay pedidos pendientes de cotización</p>
    </div>
    {% endfor %}

    <script>
        function fijarPrecio(id, precio) {
            if(!confirm(`¿Fijar envío en $${precio.toFixed(2)} para pedido #${id}?`)) return;
            enviar(id, precio);
        }

        function ingresarPrecio(id) {
            let p = prompt("Ingresa el valor del envío (ej: 3.50):");
            if(p && !isNaN(p)) enviar(id, parseFloat(p));
        }

        function enviar(id, precio) {
            fetch('/api/fijar-precio-carrera/', {
                method: 'POST',
                body: JSON.stringify({ pedido_id: id, precio: precio })
            })
            .then(r => r.json())
            .then(d => {
                if(d.status === 'ok') location.reload();
                else alert(d.mensaje);
            });
        }
        
        // Auto-refresh cada 10s
        setTimeout(() => location.reload(), 10000);
    </script>
</body>
</html>
