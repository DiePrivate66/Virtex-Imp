{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-bosco-dark">
    <div class="bg-[#1a1a1a] p-8 rounded-2xl shadow-2xl border border-gray-800 w-full max-w-lg text-center">
        <h1 class="text-3xl font-black text-white mb-2 uppercase">Apertura de Caja</h1>
        <p class="text-gray-400 mb-8">INICIA TU TURNO INGRESANDO EL FONDO DE CAJA</p>

        <div class="mb-8">
            <label class="block text-gray-500 text-sm font-bold mb-2 uppercase">Base Inicial ($)</label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-2xl font-bold">$</span>
                <input type="number" id="monto-inicial" class="w-full bg-black text-white text-4xl font-black py-4 pl-10 pr-4 rounded-xl border border-gray-700 focus:border-bosco-orange focus:outline-none text-center" placeholder="0.00" step="0.01">
            </div>
        </div>

        <button onclick="abrirCaja()" class="w-full bg-bosco-orange text-black font-black py-4 rounded-xl text-xl hover:bg-orange-500 transition-transform active:scale-95 shadow-lg shadow-orange-900/20">
            ABRIR CAJA
        </button>
        
        <a href="/login/" class="block mt-6 text-gray-500 text-sm hover:text-white underline">Cancelar / Salir</a>
    </div>
</div>

<script>
    function abrirCaja() {
        const monto = parseFloat(document.getElementById('monto-inicial').value) || 0;
        
        if(!confirm(`¿Confirma abrir caja con $${monto.toFixed(2)}?`)) return;

        fetch('/api/abrir-caja/', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify({ monto_inicial: monto })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'ok') {
                window.location.href = '/'; // Ir al POS
            } else {
                alert("Error al abrir caja");
            }
        });
    }
</script>
{% endblock %}
